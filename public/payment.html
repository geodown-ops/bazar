<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>訂單付款確認 | bazar花園</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .pay-success-icon {
      font-size: 64px;
      color: #10b981;
      margin-bottom: 20px;
    }
  </style>
</head>
<body style="background-color: #f1f6f3;">

  <div class="container">
    <div class="payment-box" id="paymentBox">
      <!-- Loading State -->
      <div id="loadingState">
        <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 40px; color: var(--primary-color); margin-bottom: 16px;"></i>
        <p>載入訂單資料中，請稍候...</p>
      </div>

      <!-- Main Payment Details State -->
      <div id="paymentDetailsState" style="display: none;">
        <h2 class="payment-title"><i class="fa-solid fa-cash-register" style="color: var(--primary-color);"></i> 訂房確認與付款</h2>
        <p style="color: var(--text-light); margin-bottom: 24px;">請確認您的訂房資料與金額，選擇付款方式後進行付款。</p>
        
        <div class="payment-details">
          <div class="payment-detail-row">
            <strong>訂單編號</strong>
            <span id="dt_orderId" style="font-family: monospace; font-weight: 700; color: var(--secondary-color);">BZ-123456</span>
          </div>
          <div class="payment-detail-row">
            <strong>聯絡姓名</strong>
            <span id="dt_name">施先生</span>
          </div>
          <div class="payment-detail-row">
            <strong>聯絡電話</strong>
            <span id="dt_phone">0975080788</span>
          </div>
          <div class="payment-detail-row">
            <strong>房型與入住</strong>
            <span id="dt_roomInfo">翠竹雙人房 (1 晚)</span>
          </div>
          <div class="payment-detail-row">
            <strong>入住期間</strong>
            <span id="dt_dates">2026-06-25 ~ 2026-06-26</span>
          </div>
          <div class="payment-detail-row">
            <strong>入住人數</strong>
            <span id="dt_people">2 大 0 小</span>
          </div>
          
          <div style="margin: 16px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 12px;">
            <strong style="display:block; margin-bottom: 8px;">加購套裝內容</strong>
            <ul id="dt_packages" style="padding-left: 20px; font-size: 13px; color: var(--text-light);">
              <li>無加購項目</li>
            </ul>
          </div>
          
          <div class="payment-detail-row" style="font-size: 18px; font-weight: 800; color: var(--accent-color); border-bottom: none; margin-top: 16px;">
            <strong>總金額</strong>
            <span id="dt_total">NT$ 2,000</span>
          </div>
          <div class="payment-detail-row" style="border: none;">
            <strong>目前付款狀態</strong>
            <span id="dt_status" class="status-badge pending">待付款</span>
          </div>
        </div>

        <div id="unpaidSection">
          <h4 style="margin-bottom: 16px; font-size: 15px; text-align: left;"><i class="fa-solid fa-credit-card"></i> 選擇金流通道：</h4>
          <div class="gateway-logos">
            <button class="gateway-btn active" id="btn_ecpay"><i class="fa-solid fa-shield-halved"></i> 綠界金流 (ECPay)</button>
            <button class="gateway-btn" id="btn_linepay"><i class="fa-brands fa-line" style="color: #06c755;"></i> LINE Pay</button>
          </div>
          <button class="btn-pay-now" id="btnPay">模擬金流支付</button>
        </div>

        <div id="paidSection" style="display: none;">
          <div class="pay-success-icon"><i class="fa-solid fa-circle-check"></i></div>
          <h3 style="color: #059669; font-weight: 800; margin-bottom: 12px;">付款成功！</h3>
          <p style="color: var(--text-light); margin-bottom: 24px; font-size: 14px;">
            我們已成功收到您的款項，房間已為您保留完成！<br>
            民宿主人將會儘快與您電話聯繫確認交通船班資訊。
          </p>
          <a href="./" class="btn-primary" style="display: inline-block;">回民宿首頁</a>
        </div>
      </div>

      <!-- Error State -->
      <div id="errorState" style="display: none;">
        <i class="fa-solid fa-circle-exclamation" style="font-size: 48px; color: #dc2626; margin-bottom: 16px;"></i>
        <p style="font-weight: 700; margin-bottom: 20px;">找不到訂單，請確認您的連結是否正確！</p>
        <a href="./" class="btn-primary">返回首頁</a>
      </div>
    </div>
  </div>

  <script>
    // Get booking ID from query string
    const urlParams = new URLSearchParams(window.location.search);
    const bookingId = urlParams.get('id');

    // DOM States
    const loadingState = document.getElementById('loadingState');
    const paymentDetailsState = document.getElementById('paymentDetailsState');
    const errorState = document.getElementById('errorState');

    // DOM Elements
    const dt_orderId = document.getElementById('dt_orderId');
    const dt_name = document.getElementById('dt_name');
    const dt_phone = document.getElementById('dt_phone');
    const dt_roomInfo = document.getElementById('dt_roomInfo');
    const dt_dates = document.getElementById('dt_dates');
    const dt_people = document.getElementById('dt_people');
    const dt_packages = document.getElementById('dt_packages');
    const dt_total = document.getElementById('dt_total');
    const dt_status = document.getElementById('dt_status');
    const unpaidSection = document.getElementById('unpaidSection');
    const paidSection = document.getElementById('paidSection');
    const btnPay = document.getElementById('btnPay');
    const btn_ecpay = document.getElementById('btn_ecpay');
    const btn_linepay = document.getElementById('btn_linepay');

    // Room name mapping
    const roomNames = {
      double: '翠竹雙人房',
      quad: '鄉村 / 自然 / 樸石四人房',
      pool_quad: '弦木 / 澄花泳池四人房',
      charter: '10 人小包棟'
    };

    let selectedGateway = 'ECPay';

    btn_ecpay.addEventListener('click', () => {
      btn_ecpay.classList.add('active');
      btn_linepay.classList.remove('active');
      selectedGateway = 'ECPay';
    });

    btn_linepay.addEventListener('click', () => {
      btn_linepay.classList.add('active');
      btn_ecpay.classList.remove('active');
      selectedGateway = 'LinePay';
    });

    async function loadBooking() {
      if (!bookingId) {
        showError();
        return;
      }

      try {
        const res = await fetch(`/api/bookings/${bookingId}`);
        const result = await res.json();
        
        if (result.success && result.booking) {
          renderBooking(result.booking);
        } else {
          showError();
        }
      } catch (err) {
        console.error('Error loading booking:', err);
        showError();
      }
    }

    function renderBooking(booking) {
      loadingState.style.display = 'none';
      paymentDetailsState.style.display = 'block';

      dt_orderId.textContent = booking.id;
      dt_name.textContent = booking.name;
      dt_phone.textContent = booking.phone;
      
      const roomName = roomNames[booking.roomType] || booking.roomType;
      dt_roomInfo.textContent = `${roomName} (${booking.nights} 晚)`;
      dt_dates.textContent = `${booking.checkIn} ~ ${booking.checkOut}`;
      dt_people.textContent = `${booking.adults} 大 ${booking.kids} 小`;
      
      // Render packages
      dt_packages.innerHTML = '';
      if (!booking.packageDetails || booking.packageDetails.length === 0) {
        const li = document.createElement('li');
        li.textContent = '無加購套裝項目';
        dt_packages.appendChild(li);
      } else {
        booking.packageDetails.forEach(p => {
          const li = document.createElement('li');
          li.innerHTML = `<strong>${p.name}</strong> - ${p.desc} (NT$ ${p.cost.toLocaleString()})`;
          dt_packages.appendChild(li);
        });
      }

      dt_total.textContent = `NT$ ${booking.totalPrice.toLocaleString()}`;

      // Set Status Badge
      updateStatusBadge(booking.paymentStatus);

      if (booking.paymentStatus === 'Paid' || booking.paymentStatus === 'Completed') {
        unpaidSection.style.display = 'none';
        paidSection.style.display = 'block';
      } else {
        unpaidSection.style.display = 'block';
        paidSection.style.display = 'none';
      }
    }

    function updateStatusBadge(status) {
      dt_status.className = 'status-badge';
      if (status === 'Pending') {
        dt_status.classList.add('pending');
        dt_status.textContent = '待付款';
      } else if (status === 'Paid') {
        dt_status.classList.add('paid');
        dt_status.textContent = '已付款';
      } else if (status === 'Completed') {
        dt_status.classList.add('completed');
        dt_status.textContent = '已完成';
      } else {
        dt_status.classList.add('cancelled');
        dt_status.textContent = '已取消';
      }
    }

    function showError() {
      loadingState.style.display = 'none';
      errorState.style.display = 'block';
    }

    // Simulate Pay Event
    btnPay.addEventListener('click', async () => {
      btnPay.disabled = true;
      btnPay.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> 金流通道扣款中...';
      
      try {
        const res = await fetch('/api/payment/simulate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bookingId: bookingId, gateway: selectedGateway })
        });
        const result = await res.json();
        
        if (result.success) {
          setTimeout(() => {
            renderBooking(result.booking);
          }, 1500); // 1.5s visual delay for premium gateway simulation feel
        } else {
          alert(`模擬支付失敗: ${result.message}`);
          btnPay.disabled = false;
          btnPay.textContent = '模擬金流支付';
        }
      } catch (err) {
        console.error('Error simulating payment:', err);
        alert('連線失敗，請重試！');
        btnPay.disabled = false;
        btnPay.textContent = '模擬金流支付';
      }
    });

    // Load on load
    loadBooking();
  </script>
</body>
</html>
